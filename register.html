<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercedes-Benz - Inscription</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Outfit', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; background: url('IMG_3267.jpeg') no-repeat center center fixed; background-size: cover; }
        .register-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; width: 100%; max-width: 350px; border: 1px solid rgba(255,255,255,0.2); color: white; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 25px; letter-spacing: 1px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; background: rgba(255,255,255,0.9); box-sizing: border-box; font-family: inherit; color: #000; }
        button { width: 100%; padding: 15px; margin-top: 20px; border-radius: 12px; border: none; background: #000; color: #fff; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: #333; }
        .info { font-size: 12px; margin-top: 15px; opacity: 0.8; }
        .link { font-size: 13px; margin-top: 15px; display: block; color: white; text-decoration: none; opacity: 0.9; }
    </style>
</head>
<body>

    <div class="register-card">
        <h1>MERCEDES-BENZ</h1>
        <input type="tel" id="phone" placeholder="+243 (Numéro DRC)" maxlength="13">
        <input type="password" id="password" placeholder="Mot de passe (6 chiffres)" maxlength="6">
        <input type="text" id="ref" placeholder="Code parrain (optionnel)">
        <button onclick="register()">S'INSCRIRE</button>
        <a href="index.html" class="link">Déjà un compte ? Se connecter</a>
        <p class="info">Propriété réservée à nos investisseurs.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURATION CORRIGÉE AVEC TON LIEN RÉEL
        const firebaseConfig = {
            databaseURL: "https://mercedbenzinvest-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Récupérer le parrain depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const refFromUrl = urlParams.get('ref');
        if(refFromUrl) {
            document.getElementById('ref').value = refFromUrl;
        }

        window.register = async () => {
            const phone = document.getElementById('phone').value.replace(/\s+/g, '');
            const pass = document.getElementById('password').value;
            const parrain = document.getElementById('ref').value;

            if(phone.length < 9) return alert("Entrez un numéro valide.");
            if(pass.length !== 6) return alert("Le mot de passe doit faire 6 chiffres.");

            // Création automatique d'un code unique
            const codePerso = "MB-" + Math.floor(10000 + Math.random() * 90000);

            try {
                // Vérifier si l'utilisateur existe déjà
                const userRef = ref(db, 'users/' + phone);
                const snap = await get(userRef);
                
                if(snap.exists()){
                    alert("Ce numéro est déjà inscrit. Veuillez vous connecter.");
                    window.location.href = "index.html";
                    return;
                }

                // Enregistrement des données
                await set(userRef, {
                    password: pass,
                    parraine_par: parrain || "AUCUN",
                    mon_code: codePerso,
                    solde: 0,
                    total_commissions: 0,
                    date_creation: new Date().toISOString()
                });

                localStorage.setItem('userPhone', phone);
                localStorage.setItem('userCode', codePerso); // Stockage du code pour la page équipe
                
                alert("Bienvenue chez Mercedes-Benz !");
                window.location.href = "dashboard.html";
            } catch (error) {
                console.error(error);
                alert("Erreur lors de l'inscription. Vérifiez votre connexion.");
            }
        };
    </script>
</body>
</html>
