<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercedes - Historique Retraits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .text-gold { color: #d4af37; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <button onclick="history.back()" class="text-gold text-sm mb-6">← Retour</button>
        <h2 class="text-2xl font-bold text-white mb-6 uppercase tracking-widest text-center">Historique Retraits</h2>
        
        <div id="historyList" class="space-y-4">
            <p class="text-center text-gray-500 mt-10">Chargement de vos retraits...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, query, orderByChild, equalTo, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURATION RÉELLE DE TA CONSOLE
        const firebaseConfig = { databaseURL: "https://mercedbenzinvest-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const userPhone = localStorage.getItem('userPhone');
        const list = document.getElementById('historyList');
        
        if (!userPhone) {
            window.location.href = "index.html";
        } else {
            // Requête vers la branche 'retraits' filtrée par 'phone_compte'
            const retraitsRef = ref(db, 'retraits');
            const q = query(retraitsRef, orderByChild('phone_compte'), equalTo(userPhone));
            
            onValue(q, (snap) => {
                list.innerHTML = '';
                
                if(!snap.exists()) {
                    list.innerHTML = '<p class="text-center text-gray-500 mt-10">Aucun retrait trouvé dans votre historique.</p>';
                    return;
                }
                
                const items = [];
                snap.forEach((child) => {
                    items.push(child.val());
                });
                
                // Plus récent en haut
                items.reverse();

                items.forEach((d) => {
                    // Gestion de la couleur du statut
                    let statusClass = "border-gold/30 text-gold"; // En attente
                    if(d.status === "Validé" || d.status === "Terminé") statusClass = "border-green-500/30 text-green-500";
                    if(d.status === "Refusé") statusClass = "border-red-500/30 text-red-500";

                    list.innerHTML += `
                    <div class="glass p-5 rounded-2xl flex justify-between items-center transition hover:bg-white/10">
                        <div>
                            <p class="font-bold text-lg text-white">${Number(d.montant_brut || 0).toLocaleString()} <span class="text-xs text-gold">FC</span></p>
                            <p class="text-[10px] text-gray-400 mt-1">Via ${d.reseau} • ${d.date ? d.date.split(' ')[0] : 'Récemment'}</p>
                        </div>
                        <div class="text-right">
                            <span class="px-3 py-1 bg-white/5 border ${statusClass} rounded-lg text-[9px] uppercase font-bold">
                                ${d.status || 'EN ATTENTE'}
                            </span>
                        </div>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
