<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercedes-Benz - Mes Investissements</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Outfit', sans-serif; background: #000; color: #fff; padding-bottom: 100px; }
        .header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .page-title { font-size: 20px; font-weight: 600; letter-spacing: 1px; color: #d4af37; }
        .container { padding: 20px; }
        .my-product-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border-radius: 20px; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        .product-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; border: 1px solid rgba(212, 175, 55, 0.3); }
        .info { flex: 1; }
        .name { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
        .income { font-size: 13px; color: #d4af37; font-weight: 600; margin-bottom: 10px; }
        .btn-claim { 
            width: 100%; padding: 12px; border-radius: 10px; border: none; 
            font-weight: 700; font-size: 11px; cursor: pointer; transition: 0.3s; 
        }
        .btn-active { background: #fff; color: #000; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
        .btn-wait { background: rgba(255,255,255,0.1); color: #666; cursor: not-allowed; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-item { text-align: center; cursor: pointer; color: #888; font-size: 10px; font-weight: 600; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <div class="page-title">MES ÉQUIPEMENTS</div>
    </div>

    <div class="container" id="myProducts">
        <p style="text-align: center; opacity: 0.5;">Chargement de vos actifs...</p>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="location.href='dashboard.html'">⟐<br>ACCUEIL</div>
        <div class="nav-item" onclick="location.href='produits.html'">🏎️<br>PRODUITS</div>
        <div class="nav-item active" onclick="location.href='mes_produits.html'">◈<br>MES BIENS</div>
        <div class="nav-item" onclick="location.href='profil.html'">👤<br>PROFIL</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://mercedbenzinvest-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const userPhone = localStorage.getItem('userPhone');
        const container = document.getElementById('myProducts');

        if (!userPhone) {
            container.innerHTML = "<p style='text-align:center;'>Veuillez vous connecter.</p>";
        } else {
            // Écoute des produits de l'utilisateur
            onValue(ref(db, 'users/' + userPhone + '/produits'), (snap) => {
                container.innerHTML = '';
                
                if (!snap.exists()) {
                    container.innerHTML = `
                        <p style='text-align:center; opacity:0.5; margin-top:50px;'>Aucun investissement actif.</p>
                        <button onclick="location.href='produits.html'" style="display:block; margin:20px auto; background:#d4af37; border:none; padding:12px 20px; border-radius:10px; font-weight:bold;">Aller à la boutique</button>
                    `;
                    return;
                }

                snap.forEach((child) => {
                    const p = child.val();
                    const productId = child.key;
                    
                    const now = Date.now();
                    const lastClaim = p.lastClaim || p.buyDate || 0;
                    const diffMs = now - lastClaim;
                    const diffHours = diffMs / (1000 * 60 * 60);
                    
                    const canClaim = diffHours >= 24;
                    const timeLeft = Math.max(0, Math.ceil(24 - diffHours));

                    // Création de l'élément pour éviter les bugs d'injection onclick
                    const card = document.createElement('div');
                    card.className = 'my-product-card';
                    card.innerHTML = `
                        <img src="${p.imageURL || 'IMG_3265.jpeg'}" class="product-img">
                        <div class="info">
                            <div class="name">${p.nom || 'Mercedes VIP'}</div>
                            <div class="income">+ ${Number(p.revenu).toLocaleString()} FC / jour</div>
                            <button id="btn-${productId}" class="btn-claim ${canClaim ? 'btn-active' : 'btn-wait'}">
                                ${canClaim ? 'RÉCUPÉRER LE REVENU' : 'DISPONIBLE DANS ' + timeLeft + 'H'}
                            </button>
                        </div>
                    `;
                    
                    container.appendChild(card);

                    // On attache l'événement directement ici (plus propre et sécurisé)
                    const btn = document.getElementById(`btn-${productId}`);
                    btn.addEventListener('click', () => {
                        window.collectGain(productId, p.revenu, canClaim);
                    });
                });
            });
        }

        // Rendre la fonction accessible globalement
        window.collectGain = async (id, amount, isReady) => {
            if (!isReady) return;

            const btn = document.getElementById(`btn-${id}`);
            if(btn.disabled) return;

            btn.innerText = "TRANSFERT...";
            btn.disabled = true;

            try {
                const updates = {};
                updates['users/' + userPhone + '/solde'] = increment(Number(amount));
                updates['users/' + userPhone + '/produits/' + id + '/lastClaim'] = Date.now();

                await update(ref(db), updates);
                alert("Bravo ! +" + Number(amount).toLocaleString() + " FC ajoutés à votre solde.");
            } catch (e) {
                console.error(e);
                alert("Erreur réseau. Réessayez.");
                btn.disabled = false;
                btn.innerText = "RÉCUPÉRER LE REVENU";
            }
        };
    </script>
</body>
</html>
